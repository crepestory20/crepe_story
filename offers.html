<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="عروض مطعم CRÊPE STORY - استمتع بأقوى العروض الخاصة للخميس والجمعة.">
    <title>CRÊPE STORY | عروض الخميس والجمعة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        .offers-page-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 30px 16px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .back-btn-container {
            margin-bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: flex-start;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-white);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition-smooth);
            box-shadow: var(--card-shadow);
        }
        .btn-back:hover {
            background: var(--glass-border-hover);
            transform: translateX(-4px);
        }
        @media (max-width: 480px) {
            .offers-page-container {
                padding: 16px 4px 20px;
            }
            .back-btn-container {
                margin-bottom: 12px;
                padding: 0 2px;
            }
            .btn-back {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
        }

        /* ===== Offer Cards ===== */
        .offers-list {
            display: flex;
            flex-direction: column;
            gap: 28px;
            width: 100%;
        }
        .offer-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .offer-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(197,160,89,0.25);
        }
        .offer-item-img {
            width: 100%;
            display: block;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
        }
        .offer-item-footer {
            padding: 16px;
            display: flex;
            justify-content: center;
            background: linear-gradient(135deg, rgba(197,160,89,0.08) 0%, rgba(197,160,89,0.03) 100%);
            border-top: 1px solid var(--glass-border);
        }
        .btn-offer-order {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            border-radius: 50px;
            background: linear-gradient(135deg, #c5a059 0%, #f0d080 50%, #c5a059 100%);
            color: #0B1215;
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: 1.05rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(197,160,89,0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
            justify-content: center;
        }
        .btn-offer-order:hover, .btn-offer-order:active {
            transform: scale(1.03);
            box-shadow: 0 6px 28px rgba(197,160,89,0.6);
        }
        .btn-offer-order i {
            font-size: 1.2rem;
        }

        /* Section title */
        .offers-page-title {
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            background: linear-gradient(135deg, #c5a059, #f0d080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 22px;
        }
    </style>
</head>
<body data-lang="ar">
    <!-- Floating Language Switcher -->
    <div class="lang-switch-container">
        <button id="lang-btn" class="lang-btn">
            <span class="lang-ar">English <i class="fa-solid fa-globe"></i></span>
            <span class="lang-en">العربية <i class="fa-solid fa-globe"></i></span>
        </button>
    </div>

    <!-- Theme Color Switcher -->
    <div class="theme-switcher" id="theme-switcher">
        <button class="theme-toggle-btn" id="theme-toggle-btn" title="تغيير لون الخلفية">🎨</button>
        <div class="theme-dots" id="theme-dots">
            <button class="theme-dot active" data-theme="midnight" style="background:#0B1215;" title="Midnight"></button>
            <button class="theme-dot" data-theme="ocean"    style="background:#0D1B2A;" title="Ocean"></button>
            <button class="theme-dot" data-theme="forest"   style="background:#0A1A0F;" title="Forest"></button>
            <button class="theme-dot" data-theme="espresso" style="background:#1A0F0A;" title="Espresso"></button>
            <button class="theme-dot" data-theme="plum"     style="background:#160D24;" title="Plum"></button>
            <button class="theme-dot" data-theme="slate"    style="background:#141820;" title="Slate"></button>
        </div>
    </div>

    <!-- Luxury Background Elements -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="offers-page-container">
        <!-- Back Button -->
        <div class="back-btn-container">
            <a href="index.html" class="btn-back">
                <span class="lang-ar"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</span>
                <span class="lang-en">Back to Home <i class="fa-solid fa-arrow-right"></i></span>
            </a>
        </div>

        <!-- Page Title -->
        <h1 class="offers-page-title">
            <span class="lang-ar">عروض الخميس والجمعة 🔥</span>
            <span class="lang-en">Thursday & Friday Offers 🔥</span>
        </h1>

        <!-- All Offers -->
        <div class="offers-list">

            <!-- Offer 1: بوكس العيلة -->
            <div class="offer-item">
                <img src="assets/offer_family.jpg" alt="بوكس العيلة - 5 كريب كبير + بطاطس + بيبسي 1 لتر" class="offer-item-img" onerror="this.style.display='none'">
                <div class="offer-item-footer">
                    <button class="btn-offer-order btn-glow" id="btn-order-family" onclick="orderOffer('بوكس العيلة')">
                        <span class="lang-ar">اطلب الآن <i class="fa-brands fa-whatsapp"></i></span>
                        <span class="lang-en">Order Now <i class="fa-brands fa-whatsapp"></i></span>
                    </button>
                </div>
            </div>

            <!-- Offer 2: أي أوردر فوق 250 -->
            <div class="offer-item">
                <img src="assets/offer_order250.jpg" alt="أي أوردر فوق 250 جنيه - رسمة حنة ورسم على الوش هدية" class="offer-item-img" onerror="this.style.display='none'">
                <div class="offer-item-footer">
                    <button class="btn-offer-order btn-glow" id="btn-order-250" onclick="orderOffer('أوردر فوق 250')">
                        <span class="lang-ar">اطلب الآن <i class="fa-brands fa-whatsapp"></i></span>
                        <span class="lang-en">Order Now <i class="fa-brands fa-whatsapp"></i></span>
                    </button>
                </div>
            </div>

            <!-- Offer 3: عرض الشلة -->
            <div class="offer-item">
                <img src="assets/offer_shella.jpg" alt="عرض الشلة - 4 كريب كبير + 4 بيبسي + بطاطس + وافل نوتيلا هدية - 499 جنيه" class="offer-item-img" onerror="this.style.display='none'">
                <div class="offer-item-footer">
                    <button class="btn-offer-order btn-glow" id="btn-order-shella" onclick="orderOffer('عرض الشلة')">
                        <span class="lang-ar">اطلب الآن <i class="fa-brands fa-whatsapp"></i></span>
                        <span class="lang-en">Order Now <i class="fa-brands fa-whatsapp"></i></span>
                    </button>
                </div>
            </div>

            <!-- Offer 4: 2 كريب كبير -->
            <div class="offer-item">
                <img src="assets/offer_2crepe.jpg" alt="اطلب 2 كريب كبير من اختيارك وخذ وافل هدية" class="offer-item-img" onerror="this.style.display='none'">
                <div class="offer-item-footer">
                    <button class="btn-offer-order btn-glow" id="btn-order-2crepe" onclick="orderOffer('2 كريب كبير')">
                        <span class="lang-ar">اطلب الآن <i class="fa-brands fa-whatsapp"></i></span>
                        <span class="lang-en">Order Now <i class="fa-brands fa-whatsapp"></i></span>
                    </button>
                </div>
            </div>

        </div><!-- /offers-list -->
    </div>

    <script>
        function orderOffer(offerName) {
            localStorage.setItem('selectedMenuItem', offerName);
            window.location.href = 'order.html';
        }
    </script>

    <script src="script.js?v=3"></script>
</body>
</html>
